<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locus Agent</title>
    <!-- KaTeX loaded from CDN — eliminates katex JS (~252 kB) and 59 font files (~1.2 MB) from the bundle.
         markstream-vue's setKatexLoader() in main.ts redirects math rendering to window.katex,
         so the internal import("katex") dynamic import is never triggered at runtime. -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.44/dist/katex.min.css" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.44/dist/katex.min.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

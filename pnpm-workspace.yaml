    zod: ^4.3.6
  bun-family:
    '@types/bun': ^1.3.8
  cli-tools:
    '@clack/prompts': ^0.10.0
    consola: ^3.4.2
  database:
    drizzle-kit: ^0.31.8
    drizzle-orm: ^0.45.1
  dev-tools:
    '@antfu/eslint-config': ^7.2.0
    '@types/node': ^24.10.11
    eslint: ^9.39.2

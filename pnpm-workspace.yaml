shellEmulator: true
trustPolicy: no-downgrade

packages:
  - packages/*
  - apps/*

catalogs:
  ai-sdk:
    '@ai-sdk/anthropic': ^3.0.37
    '@ai-sdk/moonshotai': ^2.0.1
    '@ai-sdk/openai': ^3.0.25
    ai: ^6.0.73
    diff: ^8.0.3
    zod: ^4.3.6
  bun-family:
    '@types/bun': ^1.3.8
  database:
    drizzle-kit: ^0.31.8
    drizzle-orm: ^0.45.1
  dev-tools:
    '@antfu/eslint-config': ^7.2.0
    '@types/node': ^24.10.11
    eslint: ^9.39.2
    typescript: ^5.9.3
  hono-family:
    hono: ^4.11.7
  unocss-family:
    '@iconify/json': ^2.2.435
    '@unocss/preset-typography': ^66.6.0
    '@unocss/preset-uno': ^66.6.0
    '@unocss/reset': ^66.6.0
    unocss: ^66.6.0
  vite-family:
    '@vitejs/plugin-vue': ^6.0.4
    vite: ^7.3.1
  vue-family:
    '@ai-sdk/vue': ^3.0.73
    '@pierre/diffs': ^1.0.10
    '@pinia/colada': ^0.21.2
    '@vue/tsconfig': ^0.8.1
    '@vueuse/core': ^14.2.0
    markstream-vue: ^0.0.6
    pinia: ^3.0.4
    vue: ^3.5.27
    vue-router: ^5.0.2

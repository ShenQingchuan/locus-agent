    '@unocss/reset': ^66.6.0
    unocss: ^66.6.0
  vite-family:
    '@vitejs/plugin-vue': ^6.0.4
    vite: ^7.3.1
  vue-family:
    '@ai-sdk/vue': ^3.0.73
    '@pierre/diffs': ^1.0.10

# git-cliff 配置：从 Git 历史生成 Changelog
# https://git-cliff.org/docs/configuration

[changelog]
body = """
{% if version %}## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}
"""
trim = true
postprocessors = [ { pattern = '\(#([0-9]+)\)', replace = "([#${1}](https://github.com/ShenQingchuan/locus-agent/issues/${1}))" }, ]

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^docs?", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^style", group = "Styling" },
  { message = "^test", group = "Testing" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore|^ci|^build", group = "Miscellaneous" },
  { message = ".*", group = "Other" },
]
filter_commits = false
sort_commits = "oldest"
